<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Interactive sorting algorithm visualiser with multiple algorithms, adjustable speed and array size." />
  <title>AlgoWorks — Sorting Visualiser</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.ico" />
</head>
<body>

  <header>
    <nav class="navbar" role="navigation" aria-label="Main navigation">
      <div class="nav-center">AlgoWorks</div>
    </nav>
    <div class="hero">
      <h1>Sorting Algorithm Visualiser</h1>
      <p class="subtitle">Learn and compare sorting algorithms with an interactive visualiser.</p>
    </div>
  </header>

  <main>
    <section class="controls" aria-label="Controls">
      <fieldset>
        <legend>Array settings</legend>
        <label for="barCount">Bars:</label>
        <input type="range" id="barCount" min="5" max="100" value="15" oninput="updateBarCount(this.value)" aria-describedby="barCountValue">
        <span id="barCountValue">15</span>

        <label for="speed" style="margin-left:1rem;">Speed:</label>
        <input type="range" id="speed" min="1" max="100" value="50" oninput="updateSpeed(this.value)" aria-describedby="speedValue">
        <span id="speedValue">50</span>
      </fieldset>

      <fieldset>
        <legend>Algorithms</legend>
        <div class="algo-buttons" role="group" aria-label="Algorithm selection">
          <button onclick="startSorting('quick')" aria-label="Quick Sort">Quick Sort</button>
          <button onclick="startSorting('bubble')" aria-label="Bubble Sort">Bubble Sort</button>
          <button onclick="startSorting('insertion')" aria-label="Insertion Sort">Insertion Sort</button>
          <button onclick="startSorting('selection')" aria-label="Selection Sort">Selection Sort</button>
          <button onclick="startSorting('heap')" aria-label="Heap Sort">Heap Sort</button>
          <button onclick="startSorting('merge')" aria-label="Merge Sort">Merge Sort</button>
          <button onclick="startSorting('shell')" aria-label="Shell Sort">Shell Sort</button>
        </div>
      </fieldset>

      <div class="actions">
        <button class="Gen" onclick="generateArray()">Generate Array</button>
        <button class="Gen" onclick="stopSorting()">Stop</button>
        <button class="Gen" onclick="resetVisualization()">Reset</button>
        <button class="Gen" onclick="testSorting()">Test</button>
      </div>

      <div id="status" role="status" aria-live="polite" style="margin-top:0.5rem;color:#333;">Ready</div>
    </section>

    <section class="visualisation">
      <div class="bar-container" id="bar-container" aria-label="Array visualisation"></div>
    </section>
  </main>

  <footer>
    <small>Tip: Use the sliders to change array size and speed. Keyboard shortcuts: G = Generate, S = Start/Stop.</small>
  </footer>

  <noscript>Please enable JavaScript to use the visualiser.</noscript>

  <script>
    // Lightweight UI helpers (non-invasive: won't replace existing script behavior)
    function updateBarCount(val){
      var el = document.getElementById('barCountValue'); if(el) el.textContent = val;
      if(window.updateBarCount) window.updateBarCount(val); // preserve existing function if defined in script.js
    }
    function updateSpeed(val){
      var el = document.getElementById('speedValue'); if(el) el.textContent = val;
      if(window.updateSpeed) window.updateSpeed(val);
    }
    // expose small keyboard shortcuts without altering existing handlers
    document.addEventListener('keydown', function(e){
      if(e.key === 'g' || e.key === 'G') generateArray && generateArray();
      if(e.key === 's' || e.key === 'S') {
        if(typeof window.isSorting !== 'undefined' && window.isSorting) stopSorting && stopSorting();
        else startSorting && startSorting('quick');
      }
    });
  </script>

  <script src="script.js"></script>
</body>
</html>
